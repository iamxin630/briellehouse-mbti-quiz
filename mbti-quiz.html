<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBTI 飾品測驗 · Brielle's house</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+TC:wght@300;400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F9F5F2;
    --warm-white: #F0E9E4;
    --sand: #E8E0DC;
    --stone: #7A5A55;
    --taupe: #7A5A55;
    --espresso: #3D2B28;
    --gold: #B07070;
    --gold-light: #C49A93;
    --rose: #B07070;
    --sage: #8a9e8c;
    --ink: #3D2B28;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    color: var(--espresso);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* DECORATIVE LINES */
  .deco-line {
    width: 60px; height: 1px;
    background: var(--gold);
    display: inline-block;
  }

  /* ---- INTRO SCREEN ---- */
  #intro-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    position: relative;
    overflow: hidden;
  }

  #intro-screen::before {
    content: '';
    position: absolute;
    top: -100px; right: -100px;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(176,112,112,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  #intro-screen::after {
    content: '';
    position: absolute;
    bottom: -80px; left: -80px;
    width: 350px; height: 350px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(196,154,147,0.1) 0%, transparent 70%);
    pointer-events: none;
  }

  .brand-tag {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--stone);
    margin-bottom: 32px;
  }

  .intro-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(48px, 8vw, 80px);
    font-weight: 300;
    line-height: 1.1;
    text-align: center;
    color: var(--espresso);
    margin-bottom: 12px;
  }

  .intro-title em {
    font-style: italic;
    color: var(--gold);
  }

  .intro-subtitle {
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    font-weight: 300;
    color: var(--taupe);
    text-align: center;
    line-height: 1.8;
    max-width: 380px;
    margin: 24px auto 48px;
  }

  .start-btn {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: linear-gradient(90deg, #a35e5e, #C49A93);
    color: #fdf8f5;
    border: none;
    padding: 16px 40px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: filter 0.3s ease;
  }
  .start-btn:hover { filter: brightness(0.92); }
  .start-btn span { position: relative; }

  .ornament {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 40px 0 0;
    color: var(--stone);
    font-size: 11px;
    letter-spacing: 0.2em;
  }

  /* ---- QUIZ SCREEN ---- */
  #quiz-screen {
    display: none;
    min-height: 100vh;
    padding: 0;
  }

  .quiz-header {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(250,246,241,0.95);
    backdrop-filter: blur(8px);
    z-index: 100;
    border-bottom: 1px solid var(--sand);
  }

  .quiz-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-style: italic;
    color: var(--espresso);
    letter-spacing: 0.05em;
  }

  .progress-info {
    font-size: 12px;
    letter-spacing: 0.15em;
    color: var(--taupe);
    text-transform: uppercase;
  }

  .progress-bar-wrap {
    position: fixed;
    top: 65px; left: 0; right: 0;
    height: 2px;
    background: var(--sand);
    z-index: 100;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #B07070, #C49A93);
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  }

  .question-container {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 100px 20px 40px;
  }

  .question-card {
    max-width: 680px;
    width: 100%;
    animation: slideUp 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .q-number {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .q-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(24px, 4vw, 36px);
    font-weight: 300;
    line-height: 1.4;
    color: var(--espresso);
    margin-bottom: 48px;
  }

  .options-grid {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 20px;
    padding: 24px 28px;
    border: 1px solid var(--sand);
    background: var(--warm-white);
    cursor: pointer;
    transition: all 0.3s ease;
    text-align: left;
    position: relative;
    overflow: hidden;
  }
  .option-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(176,112,112,0.08), rgba(196,154,147,0.05));
    opacity: 0;
    transition: opacity 0.3s;
  }
  .option-btn:hover { border-color: var(--gold); }
  .option-btn:hover::before { opacity: 1; }

  .option-letter {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-style: italic;
    color: var(--gold);
    flex-shrink: 0;
    line-height: 1;
    margin-top: 2px;
  }

  .option-content {
    position: relative;
    z-index: 1;
  }

  .option-main {
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    font-weight: 400;
    color: var(--espresso);
    line-height: 1.6;
    margin-bottom: 4px;
  }

  .option-sub {
    font-size: 12px;
    color: var(--stone);
    font-style: italic;
  }

  /* ---- RESULT SCREEN ---- */
  #result-screen {
    display: none;
    min-height: 100vh;
    padding: 80px 20px 60px;
  }

  .result-inner {
    max-width: 900px;
    margin: 0 auto;
    animation: slideUp 0.6s cubic-bezier(0.4,0,0.2,1);
  }

  .result-header {
    text-align: center;
    margin-bottom: 60px;
  }

  .result-type-badge {
    display: inline-block;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--taupe);
    margin-bottom: 16px;
  }

  .result-mbti {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(64px, 12vw, 120px);
    font-weight: 300;
    letter-spacing: 0.1em;
    color: var(--espresso);
    line-height: 1;
    margin-bottom: 16px;
  }

  .result-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-style: italic;
    color: var(--gold);
    margin-bottom: 24px;
  }

  .result-desc {
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    font-weight: 300;
    color: var(--taupe);
    line-height: 2;
    max-width: 520px;
    margin: 0 auto 48px;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 20px;
    margin: 48px 0;
    color: var(--stone);
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--sand);
  }

  .rec-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 300;
    text-align: center;
    margin-bottom: 8px;
    color: var(--espresso);
  }

  .rec-subtitle {
    font-family: 'Noto Serif TC', serif;
    font-size: 13px;
    color: var(--stone);
    text-align: center;
    margin-bottom: 40px;
    letter-spacing: 0.05em;
  }

  .jewelry-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 24px;
    margin-bottom: 48px;
  }

  .jewelry-card {
    background: var(--warm-white);
    border: 1px solid var(--sand);
    overflow: hidden;
    transition: all 0.4s ease;
    text-decoration: none;
    display: block;
  }
  .jewelry-card:hover {
    border-color: var(--gold);
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(61,46,34,0.08);
  }

  .jewelry-img-wrap {
    aspect-ratio: 1;
    overflow: hidden;
    background: var(--sand);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .jewelry-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.6s ease;
  }
  .jewelry-card:hover .jewelry-img-wrap img { transform: scale(1.05); }

  .jewelry-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #E8E0DC 0%, #7A5A55 100%);
    color: #F9F5F2;
  }

  .jewelry-placeholder .gem {
    font-size: 48px;
    margin-bottom: 12px;
    opacity: 0.6;
  }

  .jewelry-placeholder .p-series {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    letter-spacing: 0.15em;
    opacity: 0.8;
  }

  .jewelry-info {
    padding: 20px 22px;
  }

  .jewelry-series {
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .jewelry-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 300;
    color: var(--espresso);
    margin-bottom: 6px;
    line-height: 1.3;
  }

  .jewelry-desc {
    font-size: 12px;
    color: var(--taupe);
    line-height: 1.6;
    font-style: italic;
  }

  .cta-section {
    text-align: center;
    padding: 48px;
    background: #a35e5e;
    margin: 0 -0px;
    position: relative;
    overflow: hidden;
  }

  .cta-section::before {
    content: '';
    position: absolute;
    top: -50%; left: -20%;
    width: 60%;
    height: 200%;
    background: radial-gradient(ellipse, rgba(253,248,245,0.1) 0%, transparent 70%);
  }

  .cta-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-style: italic;
    font-weight: 300;
    color: var(--cream);
    margin-bottom: 8px;
    position: relative;
  }

  .cta-sub {
    font-size: 12px;
    letter-spacing: 0.2em;
    color: rgba(253,248,245,0.6);
    text-transform: uppercase;
    margin-bottom: 32px;
    position: relative;
  }

  .cta-btn {
    display: inline-block;
    padding: 14px 36px;
    border: 1px solid #fdf8f5;
    color: #fdf8f5;
    text-decoration: none;
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    transition: all 0.3s;
    position: relative;
    font-family: 'DM Sans', sans-serif;
    margin: 6px;
    cursor: pointer;
    background: transparent;
  }
  .cta-btn:hover {
    background: #fdf8f5;
    color: #a35e5e;
  }
  .cta-btn.secondary {
    border-color: rgba(253,248,245,0.45);
    color: rgba(253,248,245,0.65);
  }
  .cta-btn.secondary:hover {
    background: rgba(253,248,245,0.15);
    color: #fdf8f5;
  }

  /* Traits bar */
  .traits-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    margin-bottom: 40px;
  }
  .trait-item { }
  .trait-labels {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--taupe);
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .trait-bar {
    height: 6px;
    background: #D4C4C0;
    border-radius: 3px;
    position: relative;
    overflow: visible;
    margin: 6px 0;
  }
  .trait-ball {
    position: absolute;
    width: 16px;
    height: 16px;
    background: #F9F5F2;
    border: 2px solid #B07070;
    border-radius: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    transition: left 1s cubic-bezier(0.4,0,0.2,1) 0.3s;
    box-shadow: 0 1px 5px rgba(61,43,40,0.18);
    z-index: 1;
  }


  .screen { transition: opacity 0.4s; }

  @media (max-width: 600px) {
    .quiz-header { padding: 16px 20px; }
    .traits-grid { grid-template-columns: 1fr; }
    .jewelry-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .jewelry-info { padding: 14px 16px; }
    .cta-section { padding: 40px 24px; }
  }
</style>
</head>
<body>

<!-- ===== INTRO ===== -->
<div id="intro-screen" class="screen" style="display:flex">
  <p class="brand-tag">Brielle's house × MBTI</p>
  <h1 class="intro-title">找到屬於<br>你的<em>飾品</em></h1>
  <p class="intro-subtitle">
    每一件首飾，都是一段內心獨白。<br>
    透過十個問題，發現與你靈魂最共鳴的飾品系列。
  </p>
  <button class="start-btn" onclick="startQuiz()">
    <span>開始測驗</span>
    <span>→</span>
  </button>
  <div class="ornament">
    <span class="deco-line"></span>
    <span>10 個問題 · 4 大系列</span>
    <span class="deco-line"></span>
  </div>
</div>

<!-- ===== QUIZ ===== -->
<div id="quiz-screen" class="screen" style="display:none">
  <div class="quiz-header">
    <div class="quiz-logo">Brielle's house</div>
    <div class="progress-info" id="progress-text">01 / 10</div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-bar" style="width:10%"></div>
  </div>
  <div class="question-container">
    <div class="question-card" id="question-card"></div>
  </div>
</div>

<!-- ===== RESULT ===== -->
<div id="result-screen" class="screen" style="display:none">
  <div class="result-inner">
    <div class="result-header">
      <p class="result-type-badge">✦ 你的人格類型 ✦</p>
      <div class="result-mbti" id="result-type">INFP</div>
      <div class="result-name" id="result-nickname"></div>
      <p class="result-desc" id="result-desc"></p>

      <div class="traits-grid" id="traits-grid"></div>
    </div>

    <div class="divider">為你推薦</div>

    <div class="rec-title" id="rec-series-title"></div>
    <p class="rec-subtitle" id="rec-series-sub"></p>

    <div class="jewelry-grid" id="jewelry-grid"></div>

    <div class="cta-section">
      <p class="cta-text" id="cta-text"></p>
      <p class="cta-sub">Brielle's house · Summer Collection</p>
      <a class="cta-btn" href="https://www.briellehouse.com.tw/collections/summer" target="_blank">探索完整系列</a>
      <button class="cta-btn secondary" onclick="retakeQuiz()">重新測驗</button>
    </div>
  </div>
</div>

<script>
const questions = [
  {
    id: 1,
    text: "週末突然空出來，你的第一反應是？",
    dim: "EI",
    options: [
      { text: "馬上約朋友出門，今天不能浪費！", sub: "社交讓我充電", val: "E" },
      { text: "終於可以一個人靜靜待著了", sub: "獨處才是真正的休息", val: "I" }
    ]
  },
  {
    id: 2,
    text: "逛展覽時，你比較容易被哪種作品吸引？",
    dim: "SN",
    options: [
      { text: "精緻的工藝細節，每一筆都看得出功力", sub: "美在細節裡", val: "S" },
      { text: "充滿隱喻的抽象概念，讓你反覆思考", sub: "美在意境中", val: "N" }
    ]
  },
  {
    id: 3,
    text: "朋友來找你傾訴煩惱，你會？",
    dim: "TF",
    options: [
      { text: "先分析問題所在，給出具體的解決建議", sub: "理性是最好的幫助", val: "T" },
      { text: "先好好陪著聽，讓對方感覺被理解", sub: "情感連結最重要", val: "F" }
    ]
  },
  {
    id: 4,
    text: "出門旅行，你的計畫方式是？",
    dim: "JP",
    options: [
      { text: "行程排得滿滿的，住宿交通提前訂好", sub: "有計畫才安心", val: "J" },
      { text: "大方向有了就出發，隨興看看哪裡好玩", sub: "彈性才是旅行精髓", val: "P" }
    ]
  },
  {
    id: 5,
    text: "選購飾品時，你傾向？",
    dim: "SN",
    options: [
      { text: "經典款式，高質感的基本款百搭好看", sub: "實用美學", val: "S" },
      { text: "有故事感的設計款，帶有獨特意義", sub: "象徵才是核心", val: "N" }
    ]
  },
  {
    id: 6,
    text: "面對衝突時，你的處理方式？",
    dim: "TF",
    options: [
      { text: "直接說清楚，討論對錯比較重要", sub: "邏輯是解決之道", val: "T" },
      { text: "先照顧好雙方的情緒，和諧優先", sub: "關係比對錯重要", val: "F" }
    ]
  },
  {
    id: 7,
    text: "你比較喜歡哪種工作狀態？",
    dim: "EI",
    options: [
      { text: "和團隊一起腦力激盪，互相激發靈感", sub: "合作讓思維更活躍", val: "E" },
      { text: "一個人深度專注，自己把事情做好", sub: "安靜才能出好作品", val: "I" }
    ]
  },
  {
    id: 8,
    text: "你覺得自己是？",
    dim: "SN",
    options: [
      { text: "腳踏實地的人，注重當下的實際體驗", sub: "活在現在", val: "S" },
      { text: "常常想像未來可能性的人，愛做夢", sub: "活在可能性裡", val: "N" }
    ]
  },
  {
    id: 9,
    text: "一天結束後，你覺得最有成就感的是？",
    dim: "JP",
    options: [
      { text: "今天的待辦清單全部完成了", sub: "效率帶來滿足", val: "J" },
      { text: "意外發現了什麼有趣的事或體驗", sub: "驚喜帶來活力", val: "P" }
    ]
  },
  {
    id: 10,
    text: "如果一件飾品要代表你，你希望它是？",
    dim: "TF",
    options: [
      { text: "俐落有型，散發冷靜知性的氣質", sub: "理智的光芒", val: "T" },
      { text: "溫柔細膩，帶著浪漫詩意的溫度", sub: "情感的流動", val: "F" }
    ]
  }
];

const mbtiData = {
  INFP: { name: "理想主義者", desc: "你充滿詩意與內在深度，對美有獨特的敏感。你追求真實、渴望連結，用溫柔守護自己的價值觀。", group: "NF" },
  INFJ: { name: "提倡者", desc: "富有洞察力與理想，你安靜卻有力量。深思熟慮，用直覺感知世界，內心有一片廣闊的精神世界。", group: "NF" },
  ENFP: { name: "競選者", desc: "熱情、創意、充滿感染力。你用故事連結世界，對每一次相遇都充滿期待，讓身邊的人感受到活力。", group: "NF" },

let answers = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
let currentQ = 0;

function startQuiz() {
  document.getElementById('intro-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];
  const letters = ['A', 'B'];
  const card = document.getElementById('question-card');

  card.innerHTML = `
    <div class="q-number">
      <span class="deco-line" style="width:30px"></span>
      Question ${String(currentQ+1).padStart(2,'0')} of 10
    </div>
    <div class="q-text">${q.text}</div>
    <div class="options-grid">
      ${q.options.map((opt, i) => `
        <button class="option-btn" onclick="answer('${opt.val}')">
          <div class="option-letter">${letters[i]}</div>
          <div class="option-content">
            <div class="option-main">${opt.text}</div>
            <div class="option-sub">${opt.sub}</div>
          </div>
        </button>
      `).join('')}
    </div>
  `;

  document.getElementById('progress-text').textContent = `${String(currentQ+1).padStart(2,'0')} / 10`;
  document.getElementById('progress-bar').style.width = `${(currentQ+1)*10}%`;
}

function answer(val) {
  answers[val]++;
  currentQ++;
  if (currentQ < questions.length) {
    // animate out
    const card = document.getElementById('question-card');
    card.style.opacity = '0';
    card.style.transform = 'translateY(-20px)';
    setTimeout(() => {
      card.style.transition = 'none';
      card.style.opacity = '';
      card.style.transform = '';
      renderQuestion();
      requestAnimationFrame(() => {
        card.style.transition = '';
      });
    }, 200);
  } else {
    showResult();
  }
}

function showResult() {
  const E = answers.E > answers.I ? 'E' : 'I';
  const S = answers.S > answers.N ? 'S' : 'N';
  const T = answers.T > answers.F ? 'T' : 'F';
  const J = answers.J > answers.P ? 'J' : 'P';
  const type = E + S + T + J;
  const data = mbtiData[type] || mbtiData['INFP'];
  const series = seriesData[data.group];

  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';

  document.getElementById('result-type').textContent = type;
  document.getElementById('result-nickname').textContent = `「${data.name}」`;
  document.getElementById('result-desc').textContent = data.desc;
  document.getElementById('rec-series-title').textContent = series.title;
  document.getElementById('rec-series-sub').textContent = series.subtitle;
  document.getElementById('cta-text').textContent = series.cta;

  // Traits
  const dims = [
    { a: 'E', b: 'I', label1: '外向 E', label2: 'I 內向' },
    { a: 'S', b: 'N', label1: '實感 S', label2: 'N 直覺' },
    { a: 'T', b: 'F', label1: '思考 T', label2: 'F 情感' },
    { a: 'J', b: 'P', label1: '判斷 J', label2: 'P 知覺' }
  ];
  const traitsHtml = dims.map(d => {
    const total = (answers[d.a] || 0) + (answers[d.b] || 0);
    const rawPct = total > 0 ? Math.round((answers[d.b] / total) * 100) : 50;
    const bWins = answers[d.b] >= answers[d.a];
    let pct = (rawPct !== 50)
      ? (bWins ? Math.max(rawPct, 60) : Math.min(rawPct, 40))
      : 50;
    pct = Math.min(Math.max(pct, 15), 85);
    return `
      <div class="trait-item">
        <div class="trait-labels">
          <span>${d.label1}</span>
          <span>${d.label2}</span>
        </div>
        <div class="trait-bar">
          <div class="trait-ball" style="left:0%" data-pct="${pct}%"></div>
        </div>
      </div>
    `;
  }).join('');
  document.getElementById('traits-grid').innerHTML = traitsHtml;

  setTimeout(() => {
    document.querySelectorAll('.trait-ball').forEach(el => {
      el.style.left = el.dataset.pct;
    });
  }, 100);

  // Jewelry cards
  const jewelryHtml = series.items.map(item => `
    <a class="jewelry-card" href="https://www.briellehouse.com.tw/products/${item.code.toLowerCase()}" target="_blank">
      <div class="jewelry-img-wrap">
        <img src="./image/${item.code}/01.png" alt="${item.name}" onerror="this.style.display='none'; this.parentElement.innerHTML += '<div class=\'jewelry-placeholder\' style=\'background: linear-gradient(135deg, ${item.color}33 0%, ${item.color}88 100%)\'>圖片載入失敗</div>'" />
      </div>
      <div class="jewelry-info">
        <div class="jewelry-series">${data.group} Series · ${item.type}</div>
        <div class="jewelry-name">${item.name}</div>
        <div class="jewelry-desc">${item.desc}</div>
      </div>
    </a>
  `).join('');
  document.getElementById('jewelry-grid').innerHTML = jewelryHtml;

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function retakeQuiz() {
  answers = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
  currentQ = 0;
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('intro-screen').style.display = 'flex';
  window.scrollTo({ top: 0 });
}
</script>
